<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketentuan Fanart Karakter</title>
    <!-- Menggunakan html2canvas untuk fitur download gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Varela Round', sans-serif;
            background-color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #8c8c8c;
            margin: 0;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Container Utama Template */
        #capture-area {
            background-color: #ffffff;
            width: 900px;
            padding: 15px;
            border: 15px solid #a8a8a8;
            box-sizing: border-box;
            position: relative;
        }

        .credit {
            text-align: center;
            font-size: 10px;
            margin-bottom: 5px;
        }

        /* Header (Judul dan Legend) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .title-box {
            background-color: #9c9c9c;
            color: white;
            font-size: 26px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 0 10px 10px 0;
            margin-left: -15px;
        }

        .legend {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .legend span {
            font-size: 12px;
            font-weight: normal;
        }

        /* Layout Utama 2 Kolom */
        .main-content {
            display: flex;
            gap: 40px;
        }

        /* KOLOM KIRI */
        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .char-info {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .image-box {
            width: 150px;
            height: 180px;
            border: 2px solid #9c9c9c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-box span {
            font-size: 12px;
            text-align: center;
        }

        .info-fields {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .field input[type="text"] {
            flex: 1;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            color: #555;
            padding: 5px 0;
            background: transparent;
        }

        /* Sliders */
        .slider-section {
            margin-bottom: 30px;
        }
        
        .slider-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .range-container {
            position: relative;
            margin-bottom: 40px;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: #9c9c9c;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            border: 2px solid #9c9c9c;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            margin-top: -7px;
            cursor: pointer;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
        }
        .range-labels div { width: 25%; }

        /* KOLOM KANAN */
        .right-col {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            font-weight: bold;
            font-size: 16px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 15px;
            column-gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-item-full {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #9c9c9c;
            background-color: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background-color: #9c9c9c;
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            font-size: 18px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

    <div class="controls">
        <button onclick="downloadImage()">Unduh sebagai Foto</button>
    </div>

    <div id="capture-area">
        <div class="credit">template by @Sasera</div>
        
        <div class="header">
            <div class="title-box">Ketentuan Fanart Karakter</div>
            <div class="legend">
                <label class="checkbox-item"><input type="checkbox"> Ya</label>
                <label class="checkbox-item"><input type="checkbox"> Tidak</label>

            </div>
        </div>

        <div class="main-content">

            <div class="left-col">

                    <div class="image-box" onclick="document.getElementById('file-upload').click()">
                        <span>Klik untuk mengunggah<br>gambar karakter</span>
                        <img id="char-img" src="" alt="Karakter">
                        <input type="file" id="file-upload" style="display: none;" accept="image/*" onchange="previewImage(event)">
                    </div>
                    <div class="info-fields">
                        <div class="field">Nama: <input type="text" spellcheck="false"></div>
                        <div class="field">Spesies: <input type="text" spellcheck="false"></div>

                    </div>
                </div>

                <div class="slider-section">

                    <div class="range-container">
                        <input type="range" min="0" max="3" value="0" step="1">
                        <div class="range-labels">
                            <div>Wholesome only</div>
                            <div>Sexy<br>Dressed</div>
                            <div>Naked<br>Tasteful</div>
                            <div>Full NSFW</div>
                        </div>
                    </div>

                    <div class="slider-title">Blood & Gore</div>
                    <div class="range-container">
                        <input type="range" min="0" max="3" value="0" step="1">
                        <div class="range-labels">
                            <div>Tanpa Luka<br>Tanpa Memar</div>
                            <div>Sedikit Darah<br>Tanpa Memar</div>
                            <div>Darah & Memar<br>Signifikan</div>
                            <div>Full NSFW</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan -->
            <div class="right-col">
                <div class="checkbox-grid">
                    <label class="checkbox-item"><input type="checkbox"> Mengubah Gaya Rambut</label>
                    <label class="checkbox-item"><input type="checkbox"> Tema Depresif</label>
                    
                    <label class="checkbox-item"><input type="checkbox"> Mengubah Pakaian</label>
                    <label class="checkbox-item"><input type="checkbox"> Manic Mood</label>
                    
                    <label class="checkbox-item"><input type="checkbox"> Crossdress</label>
                    <label class="checkbox-item"><input type="checkbox"> Tema Kematian</label>
                    
                    <label class="checkbox-item"><input type="checkbox"> Gender Swap</label>
                    <label class="checkbox-item"><input type="checkbox"> Dengan Alkohol</label>
                    
                    <label class="checkbox-item"><input type="checkbox"> Mengubah Spesies</label>

                    <label class="checkbox-item"><input type="checkbox"> Mengubah Bentuk Tubuh</label>

                <div style="margin-top: 10px;">
                    <label class="checkbox-item-full"><input type="checkbox"> Bersama Karakter Lain (Friendly)</label>
                    <label class="checkbox-item-full"><input type="checkbox"> Bersama Karakter Lain (Hostile)</label>
                    <label class="checkbox-item-full"><input type="checkbox"> Bersama Karakter Lain (Romantic)</label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk mengunggah dan menampilkan foto ke dalam kotak foto
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('char-img');
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    imgElement.previousElementSibling.style.display = 'none'; // sembunyikan teks
                }
                reader.readAsDataURL(file);
            }
        }

        // Fungsi untuk mendownload elemen HTML menjadi gambar PNG
        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            
            html2canvas(captureArea, {
                scale: 2, // Kualitas HD
                backgroundColor: null
            }).then(canvas => {
                // Buat link download
                const link = document.createElement('a');
                link.download = 'Ketentuan_Fanart_Karakter.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>

</html>
