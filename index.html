<!DOCTYPE html>

<head>

    <title>Ketentuan Fanart Karakter</title>
    <!-- Menggunakan html2canvas untuk fitur download gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Varela Round', sans-serif;
            background-color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #8c8c8c;
            margin: 0;
            /* Pastikan body tidak menyebabkan isu scroll pada html2canvas */
            position: relative;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Container Utama Template */
        .wrapper {
            /* Wrapper pelindung agar html2canvas tidak error karena flexbox body */
            padding: 10px; 
            background: #2c2c2c;
        }

        #capture-area {
            background-color: #ffffff;
            width: 900px;
            padding: 15px;
            border: 15px solid #a8a8a8;
            box-sizing: border-box;
            position: relative;
            margin: 0 auto;
        }

        .credit {
            text-align: center;
            font-size: 10px;
            margin-bottom: 5px;
        }

        /* Header (Judul dan Legend) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .title-box {
            background-color: #9c9c9c;
            color: white;
            font-size: 26px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 0 10px 10px 0;
            margin-left: -15px;
        }

        .legend {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .legend span {
            font-size: 12px;
            font-weight: normal;
        }

        /* Layout Utama 2 Kolom */
        .main-content {
            display: flex;
            gap: 40px;
        }

        /* KOLOM KIRI */
        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .char-info {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .image-box {
            width: 150px;
            height: 180px;
            border: 2px solid #9c9c9c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-box span {
            font-size: 12px;
            text-align: center;
        }

        .info-fields {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .field input[type="text"] {
            flex: 1;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            color: #555;
            padding: 5px 0;
            background: transparent;
        }

        /* --- CUSTOM SLIDER UNTUK MENCEGAH BUG HTML2CANVAS --- */
        .slider-section {
            margin-bottom: 30px;
        }
        
        .slider-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .range-container {
            position: relative;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .custom-slider {
            position: relative;
            height: 24px;
            cursor: pointer;
            width: 100%;
        }

        .slider-track {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #9c9c9c;
            border-radius: 2px;
            pointer-events: none; /* Supaya klik masuk ke custom-slider */
        }

        .slider-thumb {
            position: absolute;
            top: 2px;
            left: 0%; /* Posisi diatur lewat JavaScript */
            width: 20px;
            height: 20px;
            background-color: #fff;
            border: 3px solid #9c9c9c;
            border-radius: 50%;
            transform: translateX(-50%);
            pointer-events: none; /* Supaya klik masuk ke custom-slider */
            transition: left 0.2s ease-out;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
            margin-left: -10px;
            margin-right: -10px;
        }
        .range-labels div { width: 25%; }

        /* KOLOM KANAN */
        .right-col {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            font-weight: bold;
            font-size: 16px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 15px;
            column-gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-item-full {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #9c9c9c;
            background-color: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background-color: #9c9c9c;
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            font-size: 18px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

                            <div class="range-labels">

    <script>
        // Fungsi untuk mengunggah dan menampilkan foto ke dalam kotak foto
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('char-img');
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    imgElement.previousElementSibling.style.display = 'none'; // sembunyikan teks
                }
                reader.readAsDataURL(file);
            }
        }

        // Fungsi agar Slider Custom bisa diklik & pindah posisi
        function moveSlider(event, element) {
            const rect = element.getBoundingClientRect();
            // Menghitung posisi klik relatif terhadap lebar garis slider
            let x = event.clientX - rect.left;
            let percent = (x / rect.width) * 100;

            // Snap/Mengkunci posisi ke 4 titik (0%, 33.3%, 66.6%, 100%)
            let snapPercent = 0;
            if (percent < 16) snapPercent = 0;
            else if (percent < 50) snapPercent = 33.33;
            else if (percent < 83) snapPercent = 66.66;
            else snapPercent = 100;

            // Pindahkan tuas ke posisi yang diklik
            element.querySelector('.slider-thumb').style.left = snapPercent + '%';
        }

        // Fungsi untuk mendownload elemen HTML menjadi gambar PNG
        function downloadImage() {
            // FIX: Otomatis scroll ke atas terlebih dahulu agar gambar tidak terpotong
            window.scrollTo({ top: 0, behavior: 'instant' });
            
            setTimeout(() => {
                const captureArea = document.getElementById('capture-area');
                
                html2canvas(captureArea, {
                    scale: 2, // Kualitas HD
                    useCORS: true, // Membantu memuat gambar jika ada masalah keamanan
                    scrollX: 0,
                    scrollY: 0
                }).then(canvas => {
                    // Buat link download
                    const link = document.createElement('a');
                    link.download = 'Ketentuan_Fanart_Karakter.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            }, 100); // Beri jeda 100ms agar halaman selesai scroll sebelum mengambil gambar
        }
    </script>
